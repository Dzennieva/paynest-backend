name: Build and Deploy to Dev

on:
  push:
    branches:
      - main
    paths:
      - 'services/transfer-service/**'
      - 'services/notifications-service/**'

env:
  AWS_REGION: eu-west-1

jobs:

  # ── Detect which services actually changed ──────────────────────
  # This job runs first and checks which paths were touched
  # The results are passed to the build jobs so only affected
  # services build their Docker images
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      transfer-service: ${{ steps.filter.outputs.transfer-service }}
      notifications-service: ${{ steps.filter.outputs.notifications-service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check which services changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            transfer-service:
              - 'services/transfer-service/**'
            notifications-service:
              - 'services/notifications-service/**'

  # ── Transfer Service ────────────────────────────────────────────
  build-transfer-service:
    name: Build — transfer-service
    runs-on: ubuntu-latest
    needs: detect-changes

    # Only run if transfer-service files were part of this push
    if: ${{ needs.detect-changes.outputs.transfer-service == 'true' }}

    # These permissions are required for OIDC authentication
    permissions:
      id-token: write   # allows the job to request an OIDC token from GitHub
      contents: read    # allows the job to read repository contents

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --target production \
            -t $ECR_REGISTRY/paynest/transfer-service:$IMAGE_TAG

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/paynest/transfer-service:${{ github.sha }}"
          format: table
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          vuln-type: 'os,library'
          trivyignores: 'services/transfer-service/.trivyignore'

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/paynest/transfer-service:$IMAGE_TAG

      - name: Write job summary
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "### Transfer Service Build" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$ECR_REGISTRY/paynest/transfer-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # ── Notifications Service ───────────────────────────────────────
  build-notifications-service:
    name: Build — notifications-service
    runs-on: ubuntu-latest
    needs: detect-changes

    # Only run if notifications-service files were part of this push
    if: ${{ needs.detect-changes.outputs.notifications-service == 'true' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --target production \
            -t $ECR_REGISTRY/paynest/notifications-service:$IMAGE_TAG

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/paynest/notifications-service:${{ github.sha }}"
          format: table
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          vuln-type: 'os,library'
          trivyignores: 'services/notifications-service/.trivyignore'

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/paynest/notifications-service:$IMAGE_TAG


      - name: Write job summary
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "### Notifications Service Build" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$ECR_REGISTRY/paynest/notifications-service:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY